# More info at https://github.com/FreshRSS/FreshRSS and https://github.com/FreshRSS/FreshRSS/blob/edge/Docker/README.md
services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    logging:
      options:
        max-size: 10m
    volumes:
      - ${FRESHRSS_DIR_PATH:-../volumes/freshrss}/data:/var/www/FreshRSS/data
      - ${FRESHRSS_DIR_PATH:-../volumes/freshrss}/extensions:/var/www/FreshRSS/extensions
    ports:
      - `${FRESHRSS_PUBLISHED_PORT:-8080}:80`
    environment:
      TZ: Europe/Paris
      CRON_MIN: '2,32'
      FRESHRSS_ENV: development
      LISTEN: 0.0.0.0:80
      # TRUSTED_PROXY: 172.16.0.1/12 192.168.0.1/16
      OIDC_ENABLED: 0
      FRESHRSS_INSTALL: |-
        --api-enabled
        --db-base ${DB_BASE}
        --db-host ${DB_HOST}
        --db-password ${DB_PASSWORD}
        --db-type sqlite
        --db-user ${DB_USER}
        --default-user admin
        --language en
      FRESHRSS_USER: |-
        --api-password ${ADMIN_API_PASSWORD}
        --email ${ADMIN_EMAIL}
        --language en
        --password ${ADMIN_PASSWORD}
        --user admin
    healthcheck:
      test: ["CMD", "cli/health.php"]
      timeout: 10s
      start_period: 60s
      start_interval: 11s
      interval: 75s
      retries: 3